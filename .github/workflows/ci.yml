name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cel_memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CEL_MEMORY_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/cel_memory_test
    steps:
      - uses: actions/checkout@v4
        with:
          path: cel-memory-postgres
      - uses: actions/checkout@v4
        with:
          repository: dimpagk92/cel-memory
          path: cel-memory
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cel-memory-postgres
      - run: cargo fmt --check
        working-directory: cel-memory-postgres
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: cel-memory-postgres
      - run: cargo test --all-targets
        working-directory: cel-memory-postgres
